<!-- Chatbot Widget - Floating Chat Box (Bottom-Right) -->
<div
    id="chatbot-widget"
    class="chatbot-widget"
    data-api-url="{% url 'chatbot_response' %}"
    data-contact-url="{% url 'auth:contact' %}"
    data-messages-url="{% url 'auth:guest_messages' %}"
    data-login-url="{% url 'auth:login' %}?next={% url 'auth:guest_messages' %}"
    data-is-authenticated="{% if user.is_authenticated %}true{% else %}false{% endif %}"
    data-booking-status="{{ echo_booking_status_text|default:''|escape }}"
    data-booking-detail-url="{{ echo_booking_detail_url|default:'' }}"
    data-cancel-help-url="{{ echo_cancel_help_url|default:'' }}"
    data-receipt-url="{{ echo_receipt_url|default:'' }}"
>
    <div class="chatbot-header">
        <div class="chatbot-agent">
            <div class="chatbot-avatar" aria-hidden="true">
                <i class="fas fa-concierge-bell"></i>
            </div>
            <div>
                <div class="chatbot-title">Echo</div>
                <div class="chatbot-subtitle"><span class="chatbot-status-dot"></span>Hotel assistant</div>
            </div>
        </div>
        <div class="chatbot-header-actions">
            <button id="chatbot-reset" class="chatbot-icon-btn" type="button" title="Reset chat" aria-label="Reset chat">
                <i class="fas fa-rotate-left"></i>
            </button>
            <button id="chatbot-minimize" class="chatbot-icon-btn" type="button" title="Minimize" aria-label="Minimize chat">
                <i class="fas fa-minus"></i>
            </button>
        </div>
    </div>

    <div id="chatbot-messages" class="chatbot-messages" aria-live="polite">
        <div class="chatbot-message bot-message">
            <div class="message-content">
                <p><strong>Hi, I'm Echo.</strong> I can help with rooms, rates, availability, payments, cancellations, and hotel contact details.</p>
                <p class="message-meta">Choose a quick option or ask naturally.</p>
            </div>
            <div class="message-time">Just now</div>
        </div>
    </div>

    <div class="chatbot-input-area">
        <div class="quick-replies" id="chatbot-quick-replies"></div>
        <form id="chatbot-form" class="chatbot-form">
            <input
                type="text"
                id="chatbot-input"
                class="chatbot-input"
                placeholder="Ask Echo about your stay..."
                autocomplete="off"
                maxlength="500"
            />
            <button type="submit" class="chatbot-send-btn" title="Send message" aria-label="Send message">
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </div>

    <div id="chatbot-loading" class="chatbot-loading" style="display: none;">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
    </div>
</div>

<button id="chatbot-toggle" class="chatbot-toggle" type="button" style="display: none;" title="Open chat" aria-label="Open chat">
    <i class="fas fa-comments"></i>
    <span class="chat-badge">1</span>
</button>

<style>
    .chatbot-widget,
    .chatbot-widget * {
        box-sizing: border-box;
    }

    .chatbot-widget {
        --chatbot-bg: var(--guest-surface-alt, #f6f7fb);
        --chatbot-surface: var(--guest-surface, #ffffff);
        --chatbot-surface-alt: var(--guest-surface-alt, #eef2f7);
        --chatbot-ink: var(--guest-ink, #172033);
        --chatbot-muted: var(--guest-muted, #64748b);
        --chatbot-line: var(--guest-line, #d9e1ec);
        --chatbot-brand: var(--guest-brand, #0f766e);
        --chatbot-brand-dark: var(--guest-brand-dark, #115e59);
        --chatbot-on-brand: #ffffff;
        --chatbot-radius: 8px;
        --chatbot-shadow: var(--guest-shadow, 0 18px 42px rgba(15, 23, 42, 0.12));
        position: fixed;
        right: 20px;
        bottom: 20px;
        width: min(360px, calc(100vw - 28px));
        height: min(560px, calc(100dvh - 104px));
        min-height: 420px;
        background: var(--chatbot-surface);
        border: 1px solid var(--chatbot-line);
        border-radius: var(--chatbot-radius);
        box-shadow: var(--chatbot-shadow);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        font-family: "DM Sans", "Lato", "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        z-index: 9999;
        animation: chatbotEnter 0.24s ease-out;
    }

    @keyframes chatbotEnter {
        from {
            opacity: 0;
            transform: translateY(18px) scale(0.98);
        }
        to {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    .chatbot-header {
        background: var(--chatbot-brand);
        color: var(--chatbot-on-brand);
        padding: 12px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--chatbot-line);
        flex: 0 0 auto;
    }

    .chatbot-agent {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
    }

    .chatbot-avatar {
        width: 38px;
        height: 38px;
        border-radius: var(--chatbot-radius);
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        color: var(--chatbot-brand-dark);
        background: rgba(255, 255, 255, 0.92);
    }

    .chatbot-title {
        font-size: 15px;
        font-weight: 800;
        line-height: 1.2;
    }

    .chatbot-subtitle {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 3px;
        color: color-mix(in srgb, var(--chatbot-on-brand) 82%, transparent);
        font-size: 12px;
        line-height: 1.2;
    }

    .chatbot-status-dot {
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: #35d07f;
        box-shadow: 0 0 0 3px rgba(53, 208, 127, 0.18);
    }

    .chatbot-header-actions {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .chatbot-icon-btn {
        width: 32px;
        height: 32px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: var(--chatbot-radius);
        background: rgba(255, 255, 255, 0.14);
        color: var(--chatbot-on-brand);
        cursor: pointer;
        display: grid;
        place-items: center;
        transition: background 0.18s ease, transform 0.18s ease;
    }

    .chatbot-icon-btn:hover,
    .chatbot-icon-btn:focus-visible {
        background: rgba(255, 255, 255, 0.16);
        transform: translateY(-1px);
        outline: none;
    }

    .chatbot-messages {
        flex: 1;
        overflow-y: auto;
        min-height: 0;
        padding: 14px 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: var(--chatbot-bg);
    }

    .chatbot-message {
        display: flex;
        flex-direction: column;
        gap: 5px;
        max-width: 90%;
        animation: messageIn 0.22s ease-out;
    }

    @keyframes messageIn {
        from {
            opacity: 0;
            transform: translateY(8px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .bot-message {
        align-self: flex-start;
        align-items: flex-start;
    }

    .user-message {
        align-self: flex-end;
        align-items: flex-end;
    }

    .message-content {
        padding: 12px 14px;
        border-radius: var(--chatbot-radius);
        font-size: 14px;
        line-height: 1.48;
        word-break: break-word;
    }

    .bot-message .message-content {
        color: var(--chatbot-ink);
        background: var(--chatbot-surface);
        border: 1px solid var(--chatbot-line);
        border-bottom-left-radius: 3px;
        box-shadow: none;
    }

    .user-message .message-content {
        color: var(--chatbot-on-brand);
        background: var(--chatbot-brand);
        border-bottom-right-radius: 3px;
        box-shadow: none;
    }

    .message-content p {
        margin: 0;
    }

    .message-content p:not(:last-child) {
        margin-bottom: 8px;
    }

    .message-content strong {
        font-weight: 700;
    }

    .message-meta {
        color: var(--chatbot-muted);
        font-size: 12px;
    }

    .message-time {
        color: var(--chatbot-muted);
        font-size: 11px;
        padding: 0 4px;
    }

    .chatbot-input-area {
        padding: 10px;
        background: var(--chatbot-surface);
        border-top: 1px solid var(--chatbot-line);
        flex: 0 0 auto;
    }

    .chatbot-form {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px;
        border: 1px solid var(--chatbot-line);
        border-radius: var(--chatbot-radius);
        background: var(--chatbot-bg);
        transition: border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .chatbot-form:focus-within {
        border-color: var(--chatbot-brand);
        box-shadow: 0 0 0 4px color-mix(in srgb, var(--chatbot-brand) 16%, transparent);
    }

    .chatbot-input {
        min-width: 0;
        flex: 1;
        border: none;
        background: transparent;
        padding: 9px 8px;
        color: var(--chatbot-ink);
        font: inherit;
        font-size: 14px;
    }

    .chatbot-input:focus {
        outline: none;
    }

    .chatbot-input::placeholder {
        color: var(--chatbot-muted);
    }

    .chatbot-send-btn {
        width: 40px;
        height: 40px;
        border: none;
        border-radius: var(--chatbot-radius);
        color: var(--chatbot-on-brand);
        background: var(--chatbot-brand);
        cursor: pointer;
        display: grid;
        place-items: center;
        flex: 0 0 auto;
        transition: opacity 0.18s ease, transform 0.18s ease, background 0.18s ease;
    }

    .chatbot-send-btn:hover,
    .chatbot-send-btn:focus-visible {
        background: var(--chatbot-brand-dark);
        transform: translateY(-1px);
        outline: none;
    }

    .chatbot-send-btn:disabled {
        cursor: not-allowed;
        opacity: 0.55;
        transform: none;
    }

    .chatbot-loading {
        align-self: flex-start;
        margin: 0 0 10px 12px;
        padding: 11px 13px;
        border-radius: var(--chatbot-radius);
        border-bottom-left-radius: 3px;
        background: var(--chatbot-surface);
        border: 1px solid var(--chatbot-line);
        gap: 5px;
        align-items: center;
        box-shadow: none;
    }

    .loading-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--chatbot-brand);
        animation: bounce 1.2s infinite ease-in-out;
    }

    .loading-dot:nth-child(2) {
        animation-delay: 0.16s;
    }

    .loading-dot:nth-child(3) {
        animation-delay: 0.32s;
    }

    @keyframes bounce {
        0%, 80%, 100% {
            opacity: 0.35;
            transform: translateY(0);
        }
        40% {
            opacity: 1;
            transform: translateY(-5px);
        }
    }

    .quick-replies {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        overflow: visible;
        padding: 0 0 8px;
        max-height: 82px;
        overflow-y: auto;
    }

    .quick-replies:empty {
        display: none;
    }

    .quick-reply-btn {
        min-height: 30px;
        padding: 6px 9px;
        border: 1px solid var(--chatbot-line);
        border-radius: var(--chatbot-radius);
        color: var(--chatbot-ink);
        background: var(--chatbot-bg);
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 7px;
        flex: 0 1 auto;
        font: inherit;
        font-size: 11px;
        font-weight: 750;
        white-space: nowrap;
        transition: border-color 0.18s ease, background 0.18s ease, transform 0.18s ease;
    }

    .quick-reply-btn:hover,
    .quick-reply-btn:focus-visible {
        background: color-mix(in srgb, var(--chatbot-brand) 12%, var(--chatbot-bg));
        border-color: var(--chatbot-brand);
        transform: translateY(-1px);
        outline: none;
    }

    .quick-reply-btn i {
        color: var(--chatbot-brand);
        font-size: 12px;
    }

    .chatbot-contact-card {
        display: grid;
        gap: 8px;
        min-width: 230px;
    }

    .chatbot-contact-card a {
        color: var(--chatbot-brand);
        text-decoration: none;
        font-weight: 650;
    }

    .chatbot-contact-action {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        width: max-content;
        margin-top: 4px;
        padding: 8px 12px;
        border-radius: var(--chatbot-radius);
        background: var(--chatbot-brand);
        color: var(--chatbot-on-brand) !important;
    }

    .chatbot-toggle {
        position: fixed;
        right: 20px;
        bottom: 20px;
        width: 60px;
        height: 60px;
        border: 1px solid var(--chatbot-line);
        border-radius: var(--chatbot-radius);
        background: var(--chatbot-brand);
        color: var(--chatbot-on-brand);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        box-shadow: var(--chatbot-shadow);
        z-index: 9998;
        transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    .chatbot-toggle:hover,
    .chatbot-toggle:focus-visible {
        transform: translateY(-2px);
        box-shadow: 0 22px 55px rgba(15, 23, 42, 0.32);
        outline: none;
    }

    .chat-badge {
        position: absolute;
        top: -5px;
        right: -5px;
        width: 22px;
        height: 22px;
        border: 2px solid #ffffff;
        border-radius: 999px;
        background: #b91c1c;
        color: #ffffff;
        display: grid;
        place-items: center;
        font-size: 11px;
        font-weight: 800;
    }

    .chatbot-messages::-webkit-scrollbar {
        width: 7px;
    }

    .chatbot-messages::-webkit-scrollbar-track {
        background: transparent;
    }

    .chatbot-messages::-webkit-scrollbar-thumb {
        background: rgba(26, 26, 26, 0.18);
        border-radius: 999px;
    }

    @media (max-width: 480px) {
        .chatbot-widget {
            right: 8px;
            bottom: 8px;
            width: calc(100vw - 16px);
            height: min(560px, calc(100dvh - 84px));
            min-height: 380px;
            border-radius: var(--chatbot-radius);
        }

        .chatbot-message {
            max-width: 92%;
        }

        .chatbot-toggle {
            right: 12px;
            bottom: 12px;
        }
    }

    @media (max-height: 620px) {
        .chatbot-widget {
            height: calc(100dvh - 72px);
            min-height: 360px;
        }

        .chatbot-messages {
            padding: 10px;
        }

        .quick-replies {
            max-height: 70px;
        }
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const widget = document.getElementById('chatbot-widget');
        const toggle = document.getElementById('chatbot-toggle');
        const minimizeBtn = document.getElementById('chatbot-minimize');
        const resetBtn = document.getElementById('chatbot-reset');
        const form = document.getElementById('chatbot-form');
        const input = document.getElementById('chatbot-input');
        const sendBtn = form?.querySelector('.chatbot-send-btn');
        const messagesContainer = document.getElementById('chatbot-messages');
        const loadingIndicator = document.getElementById('chatbot-loading');
        const quickRepliesContainer = document.getElementById('chatbot-quick-replies');
        const apiUrl = widget?.dataset?.apiUrl || '/chatbot/api/response/';
        const contactUrl = widget?.dataset?.contactUrl || '/auth/contact/';
        const messagesUrl = widget?.dataset?.messagesUrl || '/auth/messages/';
        const loginUrl = widget?.dataset?.loginUrl || '/auth/login/?next=/auth/messages/';
        const isAuthenticated = widget?.dataset?.isAuthenticated === 'true';
        const bookingStatusText = widget?.dataset?.bookingStatus || '';
        const bookingDetailUrl = widget?.dataset?.bookingDetailUrl || '';
        const cancelHelpUrl = widget?.dataset?.cancelHelpUrl || '';
        const receiptUrl = widget?.dataset?.receiptUrl || '';
        const STORAGE_KEY = 'cebuhotel_chatbot_history_v3';
        const UI_STATE_KEY = 'cebuhotel_chatbot_ui_state_v1';
        const initialMessagesHtml = messagesContainer?.innerHTML || '';
        let fallbackStrikes = 0;

        if (!widget || !toggle || !minimizeBtn || !resetBtn || !form || !input || !sendBtn || !messagesContainer || !loadingIndicator || !quickRepliesContainer) {
            return;
        }

        const isTermsPage = document.body.classList.contains('terms-page');
        const isRoomsPage = document.body.classList.contains('rooms-page');
        const startsMinimized = isTermsPage || isRoomsPage;
        const QUICK_REPLIES = isTermsPage ? [
            { label: 'Booking', icon: 'fa-calendar-check', action: () => scrollToPolicy('booking') },
            { label: 'Payments', icon: 'fa-credit-card', action: () => scrollToPolicy('payment') },
            { label: 'Check-in', icon: 'fa-key', action: () => scrollToPolicy('checkin') },
            { label: 'Guest rules', icon: 'fa-user-shield', action: () => scrollToPolicy('guest') },
            { label: 'Privacy', icon: 'fa-lock', action: () => scrollToPolicy('privacy') },
            { label: 'Support', icon: 'fa-headset', action: () => scrollToPolicy('support') },
        ] : [
            { label: 'Rooms', icon: 'fa-bed', message: 'What rooms do you have?' },
            { label: 'Availability', icon: 'fa-calendar-check', message: 'Check room availability' },
            { label: 'My Booking Status', icon: 'fa-clipboard-check', action: showBookingStatus },
            { label: 'Cancel Booking', icon: 'fa-ban', action: showCancelBookingHelp },
            { label: 'Download Receipt', icon: 'fa-file-pdf', action: showDownloadReceiptHelp },
            { label: 'Payments', icon: 'fa-credit-card', message: 'What payment methods do you accept?' },
            { label: 'Cancellation', icon: 'fa-rotate-left', message: 'What is your cancellation policy?' },
            { label: 'Contact', icon: 'fa-phone', message: 'How do I contact the hotel?' },
            { label: 'Recommend', icon: 'fa-lightbulb', message: 'Can you recommend a room for me?' },
        ];

        const ESCALATION_REPLIES = [
            { label: 'Talk to staff', icon: 'fa-headset', action: openStaffSupport },
            { label: 'Contact details', icon: 'fa-address-card', action: showContactCard },
            { label: 'Start over', icon: 'fa-rotate-right', action: () => sendMessage('help') },
        ];

        minimizeBtn.addEventListener('click', function() {
            widget.style.display = 'none';
            toggle.style.display = 'flex';
            persistUiState(true);
        });

        toggle.addEventListener('click', function() {
            widget.style.display = 'flex';
            toggle.style.display = 'none';
            input.focus();
            persistUiState(false);
        });

        resetBtn.addEventListener('click', function() {
            fallbackStrikes = 0;
            setLoading(false);
            messagesContainer.innerHTML = initialMessagesHtml;
            try {
                localStorage.removeItem(STORAGE_KEY);
            } catch (err) {
                console.warn('Could not clear chat history:', err);
            }
            showQuickReplies();
            scrollToBottom();
        });

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const message = input.value.trim();
            if (!message || sendBtn.disabled) return;

            addMessage(message, 'user');
            input.value = '';
            setLoading(true);

            fetch(apiUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                setLoading(false);

                if (!data.success) {
                    addMessage(data.response || 'Sorry, I ran into a problem. Please try again or contact our staff.', 'bot');
                    showEscalationButtons();
                    return;
                }

                const responseText = data.response || data.reply || '';
                const isFallback = data.intent === 'unknown'
                    || responseText.toLowerCase().includes('not sure')
                    || responseText.toLowerCase().includes('connect you with our staff');

                if (isFallback) {
                    handleFallback();
                    return;
                }

                fallbackStrikes = 0;
                addMessage(responseText, 'bot');
                if (shouldShowQuickReplies(responseText)) {
                    showQuickReplies();
                }
            })
            .catch(error => {
                setLoading(false);
                console.error('Chatbot error:', error);
                addMessage("I couldn't reach the chat service. You can try again or contact our front desk for faster help.", 'bot');
                showEscalationButtons();
            });
        });

        function setLoading(isLoading) {
            loadingIndicator.style.display = isLoading ? 'flex' : 'none';
            sendBtn.disabled = isLoading;
            input.disabled = isLoading;
            if (!isLoading) input.focus();
            scrollToBottom();
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `chatbot-message ${sender}-message`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatMessage(text);

            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = 'Just now';

            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timeDiv);
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
            persistChatHistory();
        }

        function formatMessage(text) {
            return escapeHtml(text)
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n{3,}/g, '\n\n')
                .replace(/\n/g, '<br>');
        }

        function escapeHtml(text) {
            return String(text)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function showQuickReplies() {
            renderReplyButtons(QUICK_REPLIES);
        }

        function showEscalationButtons() {
            renderReplyButtons(ESCALATION_REPLIES);
        }

        function renderReplyButtons(items) {
            quickRepliesContainer.innerHTML = '';
            items.forEach((item) => {
                const btn = document.createElement('button');
                btn.className = 'quick-reply-btn';
                btn.type = 'button';
                btn.innerHTML = `<i class="fas ${item.icon}" aria-hidden="true"></i><span>${escapeHtml(item.label)}</span>`;
                btn.addEventListener('click', () => {
                    quickRepliesContainer.innerHTML = '';
                    if (item.action) {
                        item.action();
                    } else {
                        sendMessage(item.message);
                    }
                });
                quickRepliesContainer.appendChild(btn);
            });
        }

        function shouldShowQuickReplies(botMessage) {
            const text = botMessage.toLowerCase();
            const triggers = [
                'how can i help', 'what can i help', 'what would you like',
                'want to book', 'our room types', 'room prices',
                'need more details', 'can help with', 'choose'
            ];
            return triggers.some(trigger => text.includes(trigger));
        }

        function handleFallback() {
            fallbackStrikes += 1;

            if (fallbackStrikes === 1) {
                addMessage("I may have missed that. I can help with rooms, availability, booking steps, payments, cancellations, and contact details.", 'bot');
                showQuickReplies();
                return;
            }

            if (fallbackStrikes === 2) {
                addMessage("For the most accurate help, I can connect you with hotel staff or show the front desk contact details.", 'bot');
                showEscalationButtons();
                return;
            }

            addMessage("I'll point you to our staff team so you can get a clear answer quickly.", 'bot');
            showContactCard();
            fallbackStrikes = 0;
        }

        function showContactCard() {
            quickRepliesContainer.innerHTML = '';
            const card = `
                <div class="chatbot-contact-card">
                    <strong>Cebu Luxury Hotel</strong>
                    <span>Luxury Avenue, Cebu City 6000</span>
                    <span><i class="fas fa-phone"></i> <a href="tel:+63324123456">+63 32 412 3456</a></span>
                    <span><i class="fas fa-envelope"></i> <a href="mailto:reservations@cebuhotel.com">reservations@cebuhotel.com</a></span>
                    <a class="chatbot-contact-action" href="${isAuthenticated ? messagesUrl : loginUrl}">
                        <i class="fas fa-headset"></i> Talk to staff
                    </a>
                </div>`;
            addTrustedBotHtml(card);
        }

        function showBookingStatus() {
            if (!isAuthenticated) {
                addTrustedBotHtml(`
                    <div class="chatbot-contact-card">
                        <strong>My Booking Status</strong>
                        <span>Please sign in first so Echo can check your latest booking status.</span>
                        <a class="chatbot-contact-action" href="${loginUrl}">
                            <i class="fas fa-sign-in-alt"></i> Sign in
                        </a>
                    </div>`);
                return;
            }

            const detailsLink = bookingDetailUrl
                ? `<a class="chatbot-contact-action" href="${bookingDetailUrl}"><i class="fas fa-eye"></i> View booking</a>`
                : '';
            addTrustedBotHtml(`
                <div class="chatbot-contact-card">
                    <strong>My Booking Status</strong>
                    <span>${escapeHtml(bookingStatusText || 'No booking status is available right now.')}</span>
                    ${detailsLink}
                </div>`);
        }

        function showCancelBookingHelp() {
            const destination = isAuthenticated ? (cancelHelpUrl || bookingDetailUrl || '/bookings/history/') : loginUrl;
            const actionLabel = isAuthenticated ? 'Open booking' : 'Sign in';
            addTrustedBotHtml(`
                <div class="chatbot-contact-card">
                    <strong>Cancel Booking</strong>
                    <span>Bookings can be cancelled while they are still pending or confirmed. Checked-in, checked-out, and already cancelled bookings cannot be cancelled from the guest portal.</span>
                    <span>If payment was completed, Cebu Mini Hotel will mark the refund as pending review.</span>
                    <a class="chatbot-contact-action" href="${destination}">
                        <i class="fas fa-arrow-right"></i> ${actionLabel}
                    </a>
                </div>`);
        }

        function showDownloadReceiptHelp() {
            if (!isAuthenticated) {
                addTrustedBotHtml(`
                    <div class="chatbot-contact-card">
                        <strong>Download Receipt</strong>
                        <span>Please sign in first so Echo can find your latest booking confirmation PDF.</span>
                        <a class="chatbot-contact-action" href="${loginUrl}">
                            <i class="fas fa-sign-in-alt"></i> Sign in
                        </a>
                    </div>`);
                return;
            }

            const destination = receiptUrl || bookingDetailUrl || '/bookings/history/';
            const actionLabel = receiptUrl ? 'Download PDF' : 'Open booking';
            addTrustedBotHtml(`
                <div class="chatbot-contact-card">
                    <strong>Download Receipt</strong>
                    <span>You can download the booking confirmation PDF from your latest booking.</span>
                    <a class="chatbot-contact-action" href="${destination}">
                        <i class="fas fa-file-pdf"></i> ${actionLabel}
                    </a>
                </div>`);
        }

        function addTrustedBotHtml(html) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'chatbot-message bot-message';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = html;
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = 'Just now';
            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timeDiv);
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
            persistChatHistory();
        }

        function sendMessage(message) {
            input.value = message;
            form.dispatchEvent(new Event('submit'));
        }

        function scrollToPolicy(id) {
            const section = document.getElementById(id);
            if (section) {
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
                addMessage(`Showing the ${section.querySelector('h2')?.textContent.trim() || 'policy'} section.`, 'bot');
            }
        }

        function openStaffSupport() {
            window.location.href = isAuthenticated ? messagesUrl : loginUrl;
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        function persistChatHistory() {
            try {
                localStorage.setItem(STORAGE_KEY, messagesContainer.innerHTML);
            } catch (err) {
                console.warn('Could not persist chat history:', err);
            }
        }

        function loadChatHistory() {
            try {
                const historyHtml = localStorage.getItem(STORAGE_KEY);
                if (historyHtml) {
                    messagesContainer.innerHTML = historyHtml;
                }
            } catch (err) {
                console.warn('Could not load chat history:', err);
            }
            scrollToBottom();
        }

        function scrollToBottom() {
            requestAnimationFrame(() => {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        }

        function persistUiState(minimized) {
            try {
                sessionStorage.setItem(UI_STATE_KEY, JSON.stringify({
                    minimized,
                    path: window.location.pathname
                }));
            } catch (err) {
                console.warn('Could not save chatbot UI state:', err);
            }
        }

        function restoreUiState() {
            try {
                const raw = sessionStorage.getItem(UI_STATE_KEY);
                if (!raw && startsMinimized) {
                    widget.style.display = 'none';
                    toggle.style.display = 'flex';
                    return;
                }
                if (!raw) return;
                const state = JSON.parse(raw);
                if (startsMinimized && state.path !== window.location.pathname) {
                    widget.style.display = 'none';
                    toggle.style.display = 'flex';
                    return;
                }
                if (state.minimized) {
                    widget.style.display = 'none';
                    toggle.style.display = 'flex';
                }
            } catch (err) {
                console.warn('Could not restore chatbot UI state:', err);
            }
        }

        loadChatHistory();
        showQuickReplies();
        restoreUiState();
        input.focus();
    });
</script>
