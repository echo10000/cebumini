<!-- Chatbot Widget - Floating Chat Box (Bottom-Right) -->
<div id="chatbot-widget" class="chatbot-widget">
    <!-- Header -->
    <div class="chatbot-header">
        <div class="chatbot-header-title">
            <i class="fas fa-robot"></i>
            <span>Hotel Assistant</span>
        </div>
        <button id="chatbot-minimize" class="chatbot-minimize-btn" title="Minimize">
            <i class="fas fa-minus"></i>
        </button>
    </div>

    <!-- Chat Messages -->
    <div id="chatbot-messages" class="chatbot-messages">
        <div class="chatbot-message bot-message">
            <div class="message-content">
                <p>👋 Hello! I'm your Hotel Assistant. How can I help you today?</p>
                <p class="message-meta">Ask me about prices, bookings, availability, or anything else!</p>
            </div>
            <div class="message-time">Just now</div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="chatbot-input-area">
        <form id="chatbot-form" class="chatbot-form">
            <input
                type="text"
                id="chatbot-input"
                class="chatbot-input"
                placeholder="Ask me anything... (type 'help' for options)"
                autocomplete="off"
            />
            <button type="submit" class="chatbot-send-btn" title="Send message">
                <i class="fas fa-paper-plane"></i>
            </button>
        </form>
    </div>

    <!-- Loading Indicator -->
    <div id="chatbot-loading" class="chatbot-loading" style="display: none;">
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
        <span class="loading-dot"></span>
    </div>
</div>

<!-- Chatbot Toggle Button (when minimized) -->
<div id="chatbot-toggle" class="chatbot-toggle" style="display: none;" title="Open chat">
    <i class="fas fa-comments"></i>
    <span class="chat-badge">1</span>
</div>

<style>
    /* Chatbot Widget Styles */
    .chatbot-widget {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 380px;
        height: 600px;
        background: white;
        border-radius: 12px;
        box-shadow: 0 5px 30px rgba(0, 0, 0, 0.2);
        display: flex;
        flex-direction: column;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        z-index: 9999;
        animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
        from {
            transform: translateY(100px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }

    .chatbot-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 16px;
        border-radius: 12px 12px 0 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .chatbot-header-title {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 600;
        font-size: 16px;
    }

    .chatbot-header-title i {
        font-size: 18px;
        animation: rotate 2s linear infinite;
    }

    @keyframes rotate {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .chatbot-minimize-btn {
        background: rgba(255, 255, 255, 0.2);
        border: none;
        color: white;
        cursor: pointer;
        width: 32px;
        height: 32px;
        border-radius: 6px;
        font-size: 16px;
        transition: background 0.2s;
    }

    .chatbot-minimize-btn:hover {
        background: rgba(255, 255, 255, 0.3);
    }

    .chatbot-messages {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        background: #f8f9fa;
    }

    .chatbot-message {
        display: flex;
        flex-direction: column;
        gap: 4px;
        animation: messageIn 0.3s ease-out;
    }

    @keyframes messageIn {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .bot-message {
        align-items: flex-start;
    }

    .bot-message .message-content {
        background: white;
        border-left: 4px solid #667eea;
        padding: 12px;
        border-radius: 8px;
        max-width: 320px;
    }

    .user-message {
        align-items: flex-end;
    }

    .user-message .message-content {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 12px;
        border-radius: 8px;
        max-width: 320px;
    }

    .message-content p {
        margin: 0;
        font-size: 14px;
        line-height: 1.4;
    }

    .message-content p:not(:last-child) {
        margin-bottom: 8px;
    }

    .message-meta {
        font-size: 12px;
        opacity: 0.7;
        font-style: italic;
    }

    .message-time {
        font-size: 11px;
        color: #999;
        padding: 0 4px;
    }

    .chatbot-input-area {
        padding: 12px;
        border-top: 1px solid #e0e0e0;
        background: white;
    }

    .chatbot-form {
        display: flex;
        gap: 8px;
    }

    .chatbot-input {
        flex: 1;
        border: 1px solid #ddd;
        border-radius: 6px;
        padding: 10px 12px;
        font-size: 14px;
        font-family: inherit;
        transition: border-color 0.2s;
    }

    .chatbot-input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .chatbot-send-btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 6px;
        width: 40px;
        height: 40px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: transform 0.2s;
    }

    .chatbot-send-btn:hover {
        transform: scale(1.05);
    }

    .chatbot-send-btn:active {
        transform: scale(0.95);
    }

    .chatbot-loading {
        padding: 12px;
        display: flex;
        justify-content: center;
        gap: 4px;
        align-items: center;
    }

    .loading-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #667eea;
        animation: bounce 1.4s infinite;
    }

    .loading-dot:nth-child(2) {
        animation-delay: 0.2s;
    }

    .loading-dot:nth-child(3) {
        animation-delay: 0.4s;
    }

    @keyframes bounce {
        0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
        40% { opacity: 1; transform: translateY(-8px); }
    }

    /* Chatbot Toggle Button (when minimized) */
    .chatbot-toggle {
        position: fixed;
        bottom: 20px;
        right: 20px;
        width: 60px;
        height: 60px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        cursor: pointer;
        font-size: 24px;
        box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        transition: transform 0.2s, box-shadow 0.2s;
        z-index: 9998;
        animation: pulse 2s infinite;
    }

    .chatbot-toggle:hover {
        transform: scale(1.1);
        box-shadow: 0 8px 30px rgba(102, 126, 234, 0.6);
    }

    @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
    }

    .chat-badge {
        position: absolute;
        top: -5px;
        right: -5px;
        background: #ff4757;
        color: white;
        border-radius: 50%;
        width: 24px;
        height: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: bold;
        border: 2px solid white;
    }

    /* Scrollbar styling */
    .chatbot-messages::-webkit-scrollbar {
        width: 6px;
    }

    .chatbot-messages::-webkit-scrollbar-track {
        background: #f1f1f1;
    }

    .chatbot-messages::-webkit-scrollbar-thumb {
        background: #667eea;
        border-radius: 3px;
    }

    .chatbot-messages::-webkit-scrollbar-thumb:hover {
        background: #764ba2;
    }

    /* Responsive Design */
    @media (max-width: 480px) {
        .chatbot-widget {
            width: calc(100vw - 20px);
            height: calc(100vh - 100px);
            max-height: 500px;
            bottom: 60px;
            right: 10px;
        }

        .bot-message .message-content,
        .user-message .message-content {
            max-width: calc(100vw - 60px);
        }
    }
</style>

<script>
    // Chatbot Widget JavaScript
    document.addEventListener('DOMContentLoaded', function() {
        const widget = document.getElementById('chatbot-widget');
        const toggle = document.getElementById('chatbot-toggle');
        const minimizeBtn = document.getElementById('chatbot-minimize');
        const form = document.getElementById('chatbot-form');
        const input = document.getElementById('chatbot-input');
        const messagesContainer = document.getElementById('chatbot-messages');
        const loadingIndicator = document.getElementById('chatbot-loading');

        // Minimize/Show functionality
        minimizeBtn.addEventListener('click', function() {
            widget.style.display = 'none';
            toggle.style.display = 'flex';
        });

        toggle.addEventListener('click', function() {
            widget.style.display = 'flex';
            toggle.style.display = 'none';
            input.focus();
        });

        // Send message
        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const message = input.value.trim();
            if (!message) return;

            // Add user message to chat
            addMessage(message, 'user');
            input.value = '';

            // Show loading indicator
            loadingIndicator.style.display = 'flex';

            // Send to chatbot
            fetch('/chatbot/api/response/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': getCookie('csrftoken')
                },
                body: JSON.stringify({ message: message })
            })
            .then(response => response.json())
            .then(data => {
                loadingIndicator.style.display = 'none';

                if (data.success) {
                    addMessage(data.response, 'bot');
                } else {
                    addMessage('Sorry, I encountered an error. Please try again.', 'bot');
                }
            })
            .catch(error => {
                loadingIndicator.style.display = 'none';
                console.error('Error:', error);
                addMessage('Sorry, I couldn\'t process your request. Please try again.', 'bot');
            });
        });

        // Add message to chat
        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `chatbot-message ${sender}-message`;

            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            // Convert markdown-style bold to HTML (simple version)
            let htmlText = text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');

            contentDiv.innerHTML = htmlText;

            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = 'Just now';

            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timeDiv);
            messagesContainer.appendChild(messageDiv);

            // Scroll to bottom
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Get CSRF token
        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // Focus input on load
        input.focus();
    });
</script>
