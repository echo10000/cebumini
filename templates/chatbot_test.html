<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Chatbot - Test Interface</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            height: 80vh;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }
        
        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .header p {
            font-size: 12px;
            opacity: 0.9;
        }
        
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }
        
        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.user {
            justify-content: flex-end;
        }
        
        .message.assistant {
            justify-content: flex-start;
        }
        
        .message-content {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
        }
        
        .message.user .message-content {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }
        
        .message.assistant .message-content {
            background: white;
            color: #333;
            border: 1px solid #ddd;
            border-bottom-left-radius: 4px;
        }
        
        .message.system .message-content {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffc107;
            margin: 0 auto;
            justify-self: center;
            text-align: center;
        }
        
        .message.error .message-content {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
            border-radius: 0 0 12px 12px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        .toggle-ai {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
        }
        
        .toggle-ai input[type="checkbox"] {
            cursor: pointer;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .status {
            font-size: 11px;
            color: #999;
            text-align: center;
            padding: 5px 0;
        }
        
        .test-questions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .test-btn {
            padding: 8px 12px;
            background: #f0f0f0;
            color: #333;
            border: 1px solid #ddd;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s;
        }
        
        .test-btn:hover {
            background: #e0e0e0;
            color: #000;
        }

        .nav-menu {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .nav-btn {
            padding: 10px 16px;
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .nav-btn:hover {
            background: #667eea;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .nav-btn:active {
            transform: translateY(0);
        }

        .nav-btn i {
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .nav-btn {
                padding: 8px 12px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏨 Maya - Hotel Assistant</h1>
            <p>AI-Powered Hotel Chatbot • Powered by Gemini</p>
        </div>

        <!-- Navigation Menu -->
        <div class="nav-menu">
            <button class="nav-btn" onclick="sendQuickQuery('Show me available rooms')">
                <span>🛏️</span> Our Rooms
            </button>
            <button class="nav-btn" onclick="sendQuickQuery('What is your current availability?')">
                <span>📅</span> Availability
            </button>
            <button class="nav-btn" onclick="sendQuickQuery('What payment methods do you accept?')">
                <span>💳</span> Payment Methods
            </button>
            <button class="nav-btn" onclick="sendQuickQuery('What is your cancellation policy?')">
                <span>❌</span> Cancellation
            </button>
            <button class="nav-btn" onclick="sendQuickQuery('How can I contact you? Show me contact information')">
                <span>📞</span> Contact Us
            </button>
            <button class="nav-btn" onclick="sendQuickQuery('Can you recommend a room for me?')">
                <span>⭐</span> Recommend
            </button>
        </div>
        
        <div class="messages" id="messages"></div>
        
        <div class="input-area">
            <div class="input-group">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Ask about rooms, bookings, or payments..."
                    onkeypress="handleKeyPress(event)"
                >
                <button onclick="sendMessage()">Send</button>
            </div>
            
            <div class="toggle-ai">
                <input type="checkbox" id="useAI" checked>
                <label for="useAI">Use AI (Gemini)</label>
            </div>
            
            <div class="test-questions">
                <button class="test-btn" onclick="testQuestion('What are your room prices?')">Room Prices</button>
                <button class="test-btn" onclick="testQuestion('Do you have availability?')">Availability</button>
                <button class="test-btn" onclick="testQuestion('What is your cancellation policy?')">Cancellation</button>
                <button class="test-btn" onclick="testQuestion('Tell me about your amenities')">Amenities</button>
            </div>
            
            <div class="status" id="status"></div>
        </div>
    </div>
    
    <script>
        const API_URL = '/api/chatbot/';
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const useAI = document.getElementById('useAI');
        const statusDiv = document.getElementById('status');
        
        // Add greeting
        window.addEventListener('load', () => {
            addMessage("Hi there! 👋 I'm Maya, your hotel assistant. Ask me anything about our rooms, bookings, amenities, or policies!", 'assistant');
        });
        
        function addMessage(text, sender = 'user', status = '') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender} ${status}`;
            
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;
            
            messageDiv.appendChild(content);
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function testQuestion(question) {
            messageInput.value = question;
            sendMessage();
        }

        function sendQuickQuery(question) {
            messageInput.value = question;
            sendMessage();
            // Focus on input for UX feedback
            messageInput.focus();
        }
        
        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;
            
            // Add user message
            addMessage(message, 'user');
            messageInput.value = '';
            
            // Show typing indicator
            addMessage('...', 'assistant', 'system');
            const lastMsg = messagesDiv.lastElementChild;
            const loader = document.createElement('div');
            loader.className = 'loading';
            lastMsg.querySelector('.message-content').textContent = '';
            lastMsg.querySelector('.message-content').appendChild(loader);
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        use_ai: useAI.checked
                    })
                });
                
                const data = await response.json();
                
                // Remove typing indicator
                lastMsg.remove();
                
                if (response.ok) {
                    addMessage(data.response, 'assistant');
                    
                    // Show status
                    let statusText = '';
                    if (data.use_ai) {
                        statusText = '✨ AI-powered response (Gemini)';
                    } else {
                        statusText = '🔍 Keyword-based response';
                        if (data.intent) {
                            statusText += ` (Intent: ${data.intent})`;
                        }
                    }
                    if (data.status === 'keyword_fallback') {
                        statusText += ' [Fallback]';
                    }
                    statusDiv.textContent = statusText;
                } else {
                    addMessage(data.response || 'Error: ' + data.error, 'assistant', 'error');
                    statusDiv.textContent = '❌ Error occurred';
                }
            } catch (error) {
                lastMsg.remove();
                addMessage('Sorry, I encountered an error. Please try again.', 'assistant', 'error');
                statusDiv.textContent = '❌ Connection error: ' + error.message;
                console.error('Error:', error);
            }
        }
        
        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }
    </script>
</body>
</html>
