{% extends 'base.html' %}

{% block title %}Logout - Cebu Hotel{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin: 3rem auto;">
    <div style="background: white; border-radius: 12px; padding: 3rem; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1); text-align: center;">
        <div style="margin-bottom: 2rem;">
            <h2 style="color: #1a1a1a; margin-bottom: 0.5rem;">Sign Out</h2>
            <p style="color: #666;">Are you sure you want to sign out?</p>
        </div>

        <form method="POST" style="margin-bottom: 2rem;">
            {% csrf_token %}
            <button type="submit" class="btn-primary" style="width: 100%;">
                Yes, Sign Out
            </button>
        </form>

        <a href="/" class="btn-secondary" style="width: 100%;">
            Cancel
        </a>

        <div style="border-top: 1px solid #e5e7eb; padding-top: 1.5rem; margin-top: 2rem;">
            <p style="color: #666;">You will be redirected to the home page.</p>
        </div>
    </div>
</div>
{% endblock %}
